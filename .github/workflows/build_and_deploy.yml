name: Build and Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the leading v
        required: false
        default: ''

concurrency:
  group: devmind-deploy
  cancel-in-progress: false

permissions:
  contents: read

env:
  REGISTRY: ${{ vars.REGISTRY }}
  SSH_HOST: ${{ vars.DEVMIND_SSH_HOST }}
  SSH_USER: ${{ vars.DEVMIND_SSH_USER }}
  SSH_PORT: ${{ vars.DEVMIND_SSH_PORT }}
  DEPLOY_PATH: ${{ vars.DEVMIND_DEPLOY_PATH }}

jobs:
  prepare-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      ref: ${{ steps.version.outputs.ref }}
    steps:
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ] && [ -n "${GITHUB_REF_NAME}" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
            REF="${GITHUB_REF_NAME}"
          elif [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            REF="v${{ inputs.version }}"
          else
            VERSION="${GITHUB_SHA::7}"
            REF="${GITHUB_SHA}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

  build-images:
    runs-on: ubuntu-latest
    needs:
      - prepare-version
    strategy:
      matrix:
        include:
          - image_name: devmind-backend
            target: backend
          - image_name: devmind-frontend
            target: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ matrix.image_name }}:${{ needs.prepare-version.outputs.version }}
          build-args: |
            USE_MIRROR=false
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
            VITE_APP_VERSION=${{ needs.prepare-version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy:
    runs-on: ubuntu-latest
    needs:
      - prepare-version
      - build-images
    steps:
      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}
          if_key_exists: fail

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          port: ${{ env.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 3600s
          script_stop: true
          script: |
            set -euo pipefail
            mkdir -p ${{ env.DEPLOY_PATH }}
            cd ${{ env.DEPLOY_PATH }}

            APP_VERSION="${{ needs.prepare-version.outputs.version }}"
            TARGET_REF="${{ needs.prepare-version.outputs.ref }}"

            read_dotenv_value() {
              key="$1"
              [ -f .env ] || return 0
              line="$(grep -E "^(export[[:space:]]+)?${key}=" .env | tail -1 || true)"
              [ -n "$line" ] || return 0
              line="${line#export }"
              value="${line#*=}"
              value="${value%\"}"
              value="${value#\"}"
              value="${value%\'}"
              value="${value#\'}"
              printf "%s" "$value"
            }

            DEPLOY_GITHUB_TOKEN="$(read_dotenv_value DEPLOY_GITHUB_TOKEN)"
            WORKFLOW_GITHUB_TOKEN="${{ secrets.DEPLOY_GITHUB_TOKEN || github.token }}"
            DEPLOY_GITHUB_TOKEN="${DEPLOY_GITHUB_TOKEN:-$WORKFLOW_GITHUB_TOKEN}"
            INSTALL_URL="https://raw.githubusercontent.com/${{ github.repository }}/${TARGET_REF}/scripts/install.sh"
            if [ -n "$DEPLOY_GITHUB_TOKEN" ]; then
              curl -fsSL -H "Authorization: token ${DEPLOY_GITHUB_TOKEN}" \
                "$INSTALL_URL" -o install.sh.tmp
            else
              curl -fsSL "$INSTALL_URL" -o install.sh.tmp
            fi
            mv install.sh.tmp install.sh
            chmod +x install.sh

            DEPLOY_REPO="${{ github.repository }}" \
              DEPLOY_APP_VERSION="${APP_VERSION}" \
              DEPLOY_GITHUB_TOKEN="${DEPLOY_GITHUB_TOKEN}" \
              ./install.sh "${TARGET_REF}"

            echo "devmind deployment completed for version ${APP_VERSION}"
