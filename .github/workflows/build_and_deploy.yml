name: Build and Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the leading v
        required: false
        default: ''

concurrency:
  group: devmind-deploy
  cancel-in-progress: false

env:
  REGISTRY: ${{ vars.REGISTRY }}
  SSH_HOST: ${{ vars.DEVMIND_SSH_HOST }}
  SSH_USER: ${{ vars.DEVMIND_SSH_USER }}
  SSH_PORT: ${{ vars.DEVMIND_SSH_PORT }}
  DEPLOY_PATH: ${{ vars.DEVMIND_DEPLOY_PATH }}

jobs:
  prepare-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ] && [ -n "${GITHUB_REF_NAME}" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build-images:
    runs-on: ubuntu-latest
    needs:
      - prepare-version
    strategy:
      matrix:
        include:
          - image_name: devmind-backend
            target: backend
          - image_name: devmind-frontend
            target: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ matrix.image_name }}:${{ needs.prepare-version.outputs.version }}
          build-args: |
            USE_MIRROR=false
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy:
    runs-on: ubuntu-latest
    needs:
      - prepare-version
      - build-images
    steps:
      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}
          if_key_exists: fail

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          port: ${{ env.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 3600s
          script: |
            cd ${{ env.DEPLOY_PATH }}
            APP_VERSION="${{ needs.prepare-version.outputs.version }}"
            LOCK_FILE="/tmp/devmind-deploy.lock"
            MAX_WAIT=300
            WAIT_INTERVAL=5
            ELAPSED=0

            # Wait for any existing deployment to complete
            while [ -f "$LOCK_FILE" ] && [ $ELAPSED -lt $MAX_WAIT ]; do
              echo "Deployment in progress, waiting... (${ELAPSED}s/${MAX_WAIT}s)"
              sleep $WAIT_INTERVAL
              ELAPSED=$((ELAPSED + WAIT_INTERVAL))
            done

            if [ -f "$LOCK_FILE" ]; then
              echo "Timeout waiting for deployment lock. Proceeding anyway..."
            fi

            # Create lock file
            echo "$$ $(date)" > "$LOCK_FILE"
            trap "rm -f $LOCK_FILE" EXIT

            echo "Starting devmind deployment for version ${APP_VERSION}..."
            # Pull the specified image tag
            APP_VERSION="${APP_VERSION}" docker-compose -f docker-compose.yml pull
            # Start containers in detached mode - this returns immediately
            # The containers will gracefully shutdown old tasks in the background
            APP_VERSION="${APP_VERSION}" docker-compose -f docker-compose.yml up -d --force-recreate
            docker system prune -f

            echo "devmind deployment completed for version ${APP_VERSION}"
            echo "Note: Celery workers are gracefully shutting down old tasks in the background (up to 30 minutes)"
            rm -f "$LOCK_FILE"
