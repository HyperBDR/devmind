services:
  backend-api:
    image: devmind-backend:dev
    container_name: backend-api-dev
    restart: unless-stopped
    env_file:
      - ./.env.dev
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
      args:
        USE_MIRROR: ${USE_MIRROR:-true}
        DEV_MODE: "1"
    volumes:
      - ./data.dev/django/staticfiles:/opt/backend/core/staticfiles
      - ./data.dev/logs/api:/var/log/gunicorn
      - ./backend:/opt/backend
      - ./cache.dev:/opt/cache
      - ./docker/nginx/certs:/opt/backend/docker/nginx/certs
      - ./data.dev/storage:/opt/storage
    networks:
      - backend_network
    depends_on:
      - postgresql
    command: development
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  backend-worker:
    image: devmind-backend:dev
    container_name: backend-worker-dev
    restart: unless-stopped
    env_file:
      - ./.env.dev
    environment:
      WORKSPACE_ROOT: /opt/backend
    volumes:
      - ./cache.dev:/opt/cache
      - ./data.dev/logs/worker:/var/log/celery
      - ./data.dev/storage:/opt/storage
      - ./backend:/opt/backend
    networks:
      - backend_network
    depends_on:
      - backend-api
      - postgresql
      - redis
    command: celery

  backend-scheduler:
    image: devmind-backend:dev
    container_name: backend-scheduler-dev
    restart: unless-stopped
    env_file:
      - ./.env.dev
    volumes:
      - ./data.dev/logs/scheduler:/var/log/celery
      - ./backend:/opt/backend
    networks:
      - backend_network
    depends_on:
      backend-api:
        condition: service_started
      postgresql:
        condition: service_started
      redis:
        condition: service_started
    command: celery-beat

  postgresql:
    image: postgres:17
    container_name: postgresql-dev
    restart: unless-stopped
    env_file:
      - ./.env.dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-backend}
      PGDATA: /var/lib/postgresql/data/pgdata
      # Allow password authentication from any host (safe in Docker network)
      POSTGRES_HOST_AUTH_METHOD: md5
    volumes:
      - ./docker/postgresql/initdb.d:/docker-entrypoint-initdb.d:ro
      - ./docker/postgresql/etc/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./data.dev/postgresql/data:/var/lib/postgresql/data
      - ./data.dev/logs/postgresql:/var/log/postgresql
    entrypoint: ["bash", "-c", "mkdir -p /var/log/postgresql && chown -R postgres:postgres /var/log/postgresql && chmod -R 755 /var/log/postgresql && exec docker-entrypoint.sh \"$$@\""]
    ports:
      - "5432:5432"
    command:
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-backend}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:alpine
    container_name: redis-dev
    restart: unless-stopped
    command: redis-server
    volumes:
      - ./data.dev/redis:/data
      - ./data.dev/logs/redis:/var/log/redis
    networks:
      - backend_network

  flower:
    image: devmind-backend:dev
    container_name: backend-flower-dev
    restart: unless-stopped
    env_file:
      - ./.env.dev
    ports:
      - "${FLOWER_HOST_PORT:-5555}:5555"
    depends_on:
      backend-api:
        condition: service_started
      redis:
        condition: service_started
    command: flower
    networks:
      - backend_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    image: devmind-frontend:dev
    container_name: frontend-dev
    pull_policy: missing
    restart: unless-stopped
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
      - ./frontend/index.html:/app/index.html:ro
      - ./frontend/vite.config.js:/app/vite.config.js:ro
      - ./frontend/tailwind.config.js:/app/tailwind.config.js:ro
      - ./frontend/postcss.config.js:/app/postcss.config.js:ro
      - ./frontend/package.json:/app/package.json:ro
    networks:
      - backend_network
    depends_on:
      backend-api:
        condition: service_started

  nginx:
    image: nginx:latest
    container_name: nginx-dev
    restart: unless-stopped
    env_file:
      - ./.env.dev
    volumes:
      - ./docker/nginx/default.dev.conf:/etc/nginx/conf.d/default.conf
      - ./data.dev/django/staticfiles:/staticfiles:ro
      - ./data.dev/logs/nginx:/var/log/nginx
      - ./data.dev/storage:/opt/storage:ro
    ports:
      - "${DJANGO_HOST_PORT:-8000}:80"
    networks:
      - backend_network
    depends_on:
      backend-api:
        condition: service_healthy
      frontend:
        condition: service_started
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  backend_network:
    driver: bridge
