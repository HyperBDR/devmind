services:
  backend-api:
    image: registry.cn-beijing.aliyuncs.com/hypermotion_dockers/devmind-backend:${APP_VERSION:?APP_VERSION is required}
    container_name: backend-api
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
      args:
        USE_MIRROR: ${USE_MIRROR:-false}
        DEV_MODE: "0"
    env_file:
      - ./.env
    volumes:
      - ./data/django/staticfiles:/opt/backend/core/staticfiles
      - ./data/logs/api:/var/log/gunicorn
      - ./data/storage:/opt/storage
      - ./cache:/opt/cache
      - ./docker/nginx/certs:/opt/backend/docker/nginx/certs
    networks:
      - backend_network
    depends_on:
      - postgresql
    command: gunicorn
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  backend-worker:
    image: registry.cn-beijing.aliyuncs.com/hypermotion_dockers/devmind-backend:${APP_VERSION:?APP_VERSION is required}
    container_name: backend-worker
    restart: unless-stopped
    stop_grace_period: 120s
    env_file:
      - ./.env
    volumes:
      - ./data/logs/worker:/var/log/celery
      - ./data/storage:/opt/storage
      - ./cache:/opt/cache
    networks:
      - backend_network
    depends_on:
      backend-api:
        condition: service_started
      postgresql:
        condition: service_started
      redis:
        condition: service_started
    command: celery

  backend-scheduler:
    image: registry.cn-beijing.aliyuncs.com/hypermotion_dockers/devmind-backend:${APP_VERSION:?APP_VERSION is required}
    container_name: backend-scheduler
    restart: unless-stopped
    stop_grace_period: 30s
    env_file:
      - ./.env
    volumes:
      - ./data/logs/scheduler:/var/log/celery
    networks:
      - backend_network
    depends_on:
      backend-api:
        condition: service_started
      postgresql:
        condition: service_started
      redis:
        condition: service_started
    command: celery-beat

  frontend:
    container_name: frontend
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    image: registry.cn-beijing.aliyuncs.com/hypermotion_dockers/devmind-frontend:${APP_VERSION:?APP_VERSION is required}
    pull_policy: missing
    expose:
      - "80"
    networks:
      - backend_network
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -Y off --quiet --tries=1 --spider http://127.0.0.1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Recommend to use nginx proxy manager to manage the outside access
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/certs:/etc/nginx/certs:ro
      - ./data/django/staticfiles:/staticfiles:ro
      - ./data/storage:/opt/storage:ro
      - ./data/logs/nginx:/var/log/nginx
    ports:
      - "${NGINX_HTTP_PORT:-10080}:80"
      - "${NGINX_HTTPS_PORT:-10443}:443"
    networks:
      - backend_network
    depends_on:
      backend-api:
        condition: service_healthy
      frontend:
        condition: service_started
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  postgresql:
    image: postgres:17
    container_name: postgresql
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-backend}
      PGDATA: /var/lib/postgresql/data/pgdata
      # Allow password authentication from any host (safe in Docker network)
      POSTGRES_HOST_AUTH_METHOD: md5
    volumes:
      - ./docker/postgresql/initdb.d:/docker-entrypoint-initdb.d:ro
      - ./docker/postgresql/etc/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./data/postgresql/data:/var/lib/postgresql/data
      - ./data/logs/postgresql:/var/log/postgresql
    entrypoint: ["bash", "-c", "mkdir -p /var/log/postgresql && chown -R postgres:postgres /var/log/postgresql && chmod -R 755 /var/log/postgresql && exec docker-entrypoint.sh \"$$@\""]
    command:
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-backend}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server
    volumes:
      - ./data/redis:/data
      - ./data/logs/redis:/var/log/redis
    networks:
      - backend_network

networks:
  backend_network:
    driver: bridge
