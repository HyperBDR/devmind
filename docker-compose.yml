name: devmind

x-backend-service-common: &backend-service-common
  image: registry.cn-beijing.aliyuncs.com/hypermotion_dockers/devmind-backend:${APP_VERSION:?APP_VERSION is required}
  env_file:
    - ./.env
  volumes:
    - ./data/django/staticfiles:/opt/backend/core/staticfiles
    - ./data/logs/api:/var/log/gunicorn
    - ./data/storage:/opt/storage
    - ./cache:/opt/cache
    - ./docker/nginx/certs:/opt/backend/docker/nginx/certs
  networks:
    - backend_network
  depends_on:
    postgresql:
      condition: service_healthy

x-backend-api-common: &backend-api-common
  <<: *backend-service-common
  restart: unless-stopped
  build:
    context: .
    dockerfile: Dockerfile
    target: backend
    args:
      USE_MIRROR: ${USE_MIRROR:-true}
      DEV_MODE: "0"
  command: gunicorn
  depends_on:
    gotenberg:
      condition: service_healthy
    postgresql:
      condition: service_healthy
  healthcheck:
    test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 120s

x-frontend-common: &frontend-common
  image: registry.cn-beijing.aliyuncs.com/hypermotion_dockers/devmind-frontend:${APP_VERSION:?APP_VERSION is required}
  restart: unless-stopped
  build:
    context: .
    dockerfile: Dockerfile
    target: frontend
    args:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
      VITE_APP_VERSION: ${VITE_APP_VERSION:-${APP_VERSION}}
  expose:
    - "80"
  networks:
    - backend_network
  healthcheck:
    test:
      - "CMD"
      - "sh"
      - "-c"
      - "wget -Y off --quiet --tries=1 --spider http://127.0.0.1 || exit 1"
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 60s

services:
  gotenberg:
    image: gotenberg/gotenberg:8.34.0-libreoffice@sha256:3c23aeb3a027a63d7c71745fc9d83724bd58cf9dfa470396ac82c0896028db2a
    container_name: gotenberg
    restart: unless-stopped
    command:
      - gotenberg
      - --api-timeout=30s
      - --api-body-limit=8MB
      - --api-disable-download-from=true
      - --libreoffice-auto-start=true
      - --libreoffice-deny-private-ips=true
      - --libreoffice-deny-public-ips=true
      - --libreoffice-max-queue-size=20
      - --webhook-disable=true
    cpus: ${GOTENBERG_CPU_LIMIT:-2.0}
    mem_limit: ${GOTENBERG_MEMORY_LIMIT:-2g}
    networks:
      - backend_network
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  backend-init:
    <<: *backend-service-common
    container_name: backend-init
    restart: "no"
    command: init-schema

  backend-runtime-init:
    <<: *backend-service-common
    container_name: backend-runtime-init
    restart: "no"
    depends_on:
      backend-init:
        condition: service_completed_successfully
      postgresql:
        condition: service_healthy
    command: init-runtime

  backend-api-blue:
    <<: *backend-api-common
    container_name: backend-api-blue
    profiles: ["blue"]

  backend-api-green:
    <<: *backend-api-common
    container_name: backend-api-green
    profiles: ["green"]

  frontend-blue:
    <<: *frontend-common
    container_name: frontend-blue
    profiles: ["blue"]

  frontend-green:
    <<: *frontend-common
    container_name: frontend-green
    profiles: ["green"]

  backend-worker:
    image: registry.cn-beijing.aliyuncs.com/hypermotion_dockers/devmind-backend:${APP_VERSION:?APP_VERSION is required}
    container_name: backend-worker
    restart: unless-stopped
    stop_grace_period: 120s
    env_file:
      - ./.env
    volumes:
      - ./data/logs/worker:/var/log/celery
      - ./data/storage:/opt/storage
      - ./cache:/opt/cache
    networks:
      - backend_network
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery

  backend-scheduler:
    image: registry.cn-beijing.aliyuncs.com/hypermotion_dockers/devmind-backend:${APP_VERSION:?APP_VERSION is required}
    container_name: backend-scheduler
    restart: unless-stopped
    stop_grace_period: 30s
    env_file:
      - ./.env
    volumes:
      - ./data/logs/scheduler:/var/log/celery
    networks:
      - backend_network
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery-beat

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - ./docker/nginx/certs:/etc/nginx/certs:ro
      - ./data/django/staticfiles:/staticfiles:ro
      - ./data/storage:/opt/storage:ro
      - ./data/logs/nginx:/var/log/nginx
    ports:
      - "${NGINX_HTTP_PORT:-10080}:80"
      - "${NGINX_HTTPS_PORT:-10443}:443"
    networks:
      - backend_network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  postgresql:
    image: postgres:17
    container_name: postgresql
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-backend}
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_HOST_AUTH_METHOD: md5
    volumes:
      - ./docker/postgresql/initdb.d:/docker-entrypoint-initdb.d:ro
      - ./docker/postgresql/etc/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./data/postgresql/data:/var/lib/postgresql/data
      - ./data/logs/postgresql:/var/log/postgresql
    entrypoint:
      - "bash"
      - "-c"
      - "mkdir -p /var/log/postgresql && chown -R postgres:postgres /var/log/postgresql && chmod -R 755 /var/log/postgresql && exec docker-entrypoint.sh \"$$@\""
    command:
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
    networks:
      - backend_network
    healthcheck:
      test:
        - "CMD-SHELL"
        - "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-backend}"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server
    volumes:
      - ./data/redis:/data
      - ./data/logs/redis:/var/log/redis
    networks:
      - backend_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  backend_network:
    driver: bridge
